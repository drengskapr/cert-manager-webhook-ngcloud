image:
  repository: drengskapr/cert-manager-webhook-ngcloud
  # -- tag defaults to .Chart.AppVersion when unset
  tag: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

# -- The GroupName here is used to identify your company or business unit that
# -- created this webhook.
# -- For example, this may be "acme.mycompany.com".
# -- This name will need to be referenced in each Issuer's `webhook` stanza to
# -- inform cert-manager of where to send ChallengePayload resources in order to
# -- solve the DNS01 challenge.
# -- This group name should be **unique**, hence using your own company's domain
# -- here is recommended.
groupName: acme.ngcloud.ru

# -- Nubes API token. If set, a Secret named "ngcloud-api-token" is created in the
# -- release namespace. Leave empty if you manage the Secret yourself.
apiToken: ""

# -- Logging configuration
logging:
  # -- Output format: "json-rfc3339" (JSON with RFC3339Nano timestamps,
  # -- recommended for log aggregators), "json" (JSON with epoch-millis
  # -- timestamps), or "text" (local dev).
  format: json-rfc3339
  # -- Enable debug logging (renders --v=<verbosity>)
  debug: false
  # -- Verbosity level (0-10). Only applied when debug is true. v=1 surfaces the
  # -- deck-api client's debug lines.
  verbosity: 1

certManager:
  namespace: cert-manager
  serviceAccountName: cert-manager

service:
  # -- Service type, e.g. ClusterIP, NodePort, LoadBalancer
  type: ClusterIP
  # -- Service port
  port: 443

# -- port for webhook container to listen on
containerPort: 6443

resources: {}

# -- Pod-level security context. Defaults satisfy the "restricted" Pod Security
# -- Standard. The image already runs as nonroot (UID 65532); these settings
# -- make that contract explicit and enforce it.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context. The webhook only reads the mounted TLS
# -- secret and binds a port, so a read-only root filesystem is safe.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
